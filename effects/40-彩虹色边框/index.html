<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple 官方高保真彩虹渐变边框 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1 class="page-title">Apple 官方高保真彩虹渐变边框</h1>
      <p class="page-subtitle">基于 Apple 官网 mask-composite 遮罩混合与双层 blur 滤镜实现</p>
    </header>

    <div class="showcase-area">
      <div class="apple-card">
        <!-- 1. 锐利边框层 (官方 blur: 1px 参数) -->
        <div class="apple-intelligence-glow"></div>
        <!-- 2. 外发光霓虹层 (官方 blur: 9px 参数) -->
        <div class="apple-intelligence-glow apple-intelligence-glow-2"></div>
        
        <!-- 3. 卡片内容层 -->
        <div class="card-content">
          <div class="chip-icon-wrapper">
            <svg viewBox="0 0 100 100" class="chip-svg">
              <!-- 芯片引脚 -->
              <rect x="32" y="6" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="47" y="6" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="62" y="6" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="32" y="82" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="47" y="82" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="62" y="82" width="6" height="12" rx="3" fill="currentColor"/>
              <rect x="6" y="32" width="12" height="6" rx="3" fill="currentColor"/>
              <rect x="6" y="47" width="12" height="6" rx="3" fill="currentColor"/>
              <rect x="6" y="62" width="12" height="6" rx="3" fill="currentColor"/>
              <rect x="82" y="32" width="12" height="6" rx="3" fill="currentColor"/>
              <rect x="82" y="47" width="12" height="6" rx="3" fill="currentColor"/>
              <rect x="82" y="62" width="12" height="6" rx="3" fill="currentColor"/>
              <!-- 芯片主体边框 -->
              <rect x="16" y="16" width="68" height="68" rx="14" fill="none" stroke="currentColor" stroke-width="6"/>
              <!-- 苹果图标 -->
              <path d="M50 34 c-1.8 0 -3.4 1.1 -4.3 1.1 c-0.9 0 -2.2 -1 -3.7 -1 c-2.0 0 -3.8 1.1 -4.8 2.8 c-2.1 3.5 -0.5 8.7 1.4 11.6 c1.0 1.4 2.1 2.9 3.6 2.8 c1.5 -0.1 2.0 -1.0 3.7 -1.0 c1.7 0 2.2 1.0 3.7 1.0 c1.6 0 2.6 -1.4 3.5 -2.8 c1.1 -1.6 1.5 -3.2 1.6 -3.3 c-0.1 0 -3.1 -1.2 -3.1 -4.7 c0 -2.9 2.4 -4.3 2.5 -4.4 c-1.4 -2.0 -3.5 -2.3 -4.2 -2.3 Z M47.9 29.5 c0.7 -0.9 1.2 -2.1 1.0 -3.3 c-1.1 0.1 -2.4 0.7 -3.2 1.7 c-0.6 0.8 -1.2 2.1 -1.1 3.3 c1.2 0.1 2.5 -0.6 3.3 -1.7 Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="card-text-container">
            <h2>内置神经网络引擎，</h2>
            <h2>强力加持</h2>
            <h2>各类 AI 功能。</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
