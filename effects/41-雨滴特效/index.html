<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雨滴特效 - 3D 玻璃雨滴特效与折射扭曲</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .info {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
      z-index: 5;
      transition: opacity 0.3s;
      text-align: center;
    }

    /* Glassmorphic Control Panel */
    .control-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 320px;
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      color: #fff;
      z-index: 100;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      overflow: hidden;
      max-height: 90vh;
    }

    .control-panel.collapsed {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(10, 10, 15, 0.85);
    }

    .control-panel.collapsed .panel-content {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    .toggle-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      z-index: 110;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s, transform 0.6s ease;
    }

    .toggle-btn:hover {
      color: #00f3ff;
      transform: rotate(45deg);
    }

    .panel-content {
      padding: 24px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .panel-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Background Presets */
    .bg-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .bg-preset {
      height: 50px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.3s;
      overflow: hidden;
    }

    .bg-preset:hover {
      transform: scale(1.05);
    }

    .bg-preset.active {
      border-color: #00f3ff;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
    }

    /* Custom Range Input */
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .slider-header span {
      font-size: 12px;
      color: #00f3ff;
      font-weight: 600;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .auto-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .auto-control input[type="checkbox"] {
      accent-color: #00f3ff;
      cursor: pointer;
    }

    .auto-control label {
      margin-bottom: 0 !important;
      font-size: 11px !important;
      color: rgba(255, 255, 255, 0.4) !important;
      cursor: pointer;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      transition: background 0.3s;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00f3ff;
      box-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
      cursor: pointer;
      transition: transform 0.1s, background-color 0.3s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    /* Custom Switch Toggle */
    .toggles-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
    }

    .toggle-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider.round {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: .3s;
      border-radius: 18px;
    }

    .slider.round:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #00f3ff;
      box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
    }

    input:checked+.slider:before {
      transform: translateX(14px);
    }

    /* Audio Control styling */
    .audio-section {
      margin-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
    }

    .audio-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .audio-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      width: 100%;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .audio-btn:hover {
      background: rgba(0, 243, 255, 0.15);
      border-color: rgba(0, 243, 255, 0.3);
    }

    .audio-volume {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    .audio-volume input[type="range"] {
      flex-grow: 1;
    }

    /* Hide control panel on small screens / make responsive */
    @media (max-width: 480px) {
      .control-panel {
        width: calc(100vw - 32px);
        right: 16px;
        top: 16px;
      }

      .control-panel.collapsed {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>

<body>
  <div class="info">点击并拖拽屏幕，可控制动画时间与雨量<br>双击屏幕可折叠/展开控制台</div>

  <!-- Glassmorphic Control Panel -->
  <div class="control-panel" id="controlPanel">
    <button class="toggle-btn" id="togglePanelBtn" title="折叠/展开设置">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
        </path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
    <div class="panel-content">
      <h3>雨滴窗镜控制台</h3>

      <div class="section">
        <label>背景预设</label>
        <div class="bg-presets">
          <div class="bg-preset active" data-bg="neon"
            style="background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=120&q=80')">
          </div>
          <div class="bg-preset" data-bg="forest"
            style="background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=120&q=80')">
          </div>
          <div class="bg-preset" data-bg="car"
            style="background-image: url('https://images.unsplash.com/photo-1486016006115-74a41448aea2?w=120&q=80')">
          </div>
          <div class="bg-preset" data-bg="minimal"
            style="background-image: url('https://images.unsplash.com/photo-1508873696983-2df519f0397e?w=120&q=80')">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="slider-header">
          <label for="rainAmountRange">雨量控制</label>
          <span id="rainAmountValue">动态</span>
        </div>
        <div class="slider-container">
          <input type="range" id="rainAmountRange" min="0.0" max="1.0" step="0.01" value="0.7">
          <div class="auto-control">
            <input type="checkbox" id="autoRainCheckbox" checked>
            <label for="autoRainCheckbox">动态雨量变化</label>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="slider-header">
          <label for="blurRange">背景模糊</label>
          <span id="blurValue">1.0</span>
        </div>
        <input type="range" id="blurRange" min="0.0" max="2.0" step="0.1" value="1.0">
      </div>

      <div class="section">
        <div class="slider-header">
          <label for="zoomRange">画面缩放</label>
          <span id="zoomValue">1.00x</span>
        </div>
        <input type="range" id="zoomRange" min="0.5" max="2.0" step="0.05" value="1.00">
      </div>

      <div class="section toggles-row">
        <div class="toggle-control">
          <label class="switch">
            <input type="checkbox" id="lightningToggle" checked>
            <span class="slider round"></span>
          </label>
          <span>闪电效果</span>
        </div>
      </div>

      <div class="section audio-section">
        <div class="audio-header">
          <button id="audioPlayBtn" class="audio-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" class="play-icon">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" class="pause-icon" style="display:none;">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <span>播放背景雨声</span>
          </button>
        </div>
        <div class="audio-volume" style="display: none;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <input type="range" id="volumeRange" min="0" max="1" step="0.05" value="0.5">
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ===================== 场景与渲染设置 =====================
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const size = new THREE.Vector2();
    renderer.getDrawingBufferSize(size);

    // ===================== 纹理加载 =====================
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');

    const bgTexture = loader.load(
      'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1920&q=80',
      (texture) => {
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        texture.generateMipmaps = true;
        texture.needsUpdate = true;
      }
    );

    // ===================== 鼠标交互 =====================
    const mouse = new THREE.Vector4(-1, -1, -1, -1);

    const updateMouse = (x, y, isClick, isDown) => {
      mouse.x = x;
      mouse.y = window.innerHeight - y;

      if (isClick) {
        mouse.z = x;
        mouse.w = window.innerHeight - y;
      }
      if (!isDown) {
        mouse.z = -Math.abs(mouse.z);
        mouse.w = -Math.abs(mouse.w);
      }
    };

    window.addEventListener('mousedown', (e) => {
      if (e.target.closest('.control-panel')) return;
      updateMouse(e.clientX, e.clientY, true, true);
    });

    window.addEventListener('mousemove', (e) => {
      if (e.target.closest('.control-panel')) return;
      const isDown = e.buttons === 1;
      updateMouse(e.clientX, e.clientY, false, isDown);
    });

    window.addEventListener('mouseup', () => {
      mouse.z = -Math.abs(mouse.z);
      mouse.w = -Math.abs(mouse.w);
    });

    window.addEventListener('touchstart', (e) => {
      if (e.target.closest('.control-panel')) return;
      if (e.touches.length > 0) {
        updateMouse(e.touches[0].clientX, e.touches[0].clientY, true, true);
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (e.target.closest('.control-panel')) return;
      if (e.touches.length > 0) {
        updateMouse(e.touches[0].clientX, e.touches[0].clientY, false, true);
      }
    });

    window.addEventListener('touchend', () => {
      mouse.z = -Math.abs(mouse.z);
      mouse.w = -Math.abs(mouse.w);
    });

    // ===================== 着色器定义 =====================
    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      precision highp float;

      varying vec2 vUv;

      uniform float iTime;
      uniform vec3 iResolution;
      uniform vec4 iMouse;
      uniform sampler2D iChannel0;

      uniform float uRainAmount;
      uniform float uAutoRain;
      uniform float uZoom;
      uniform float uBlurScale;
      uniform float uHasLightning;

      #define S(a, b, t) smoothstep(a, b, t)

      vec3 N13(float p) {
        vec3 p3 = fract(vec3(p) * vec3(.1031, .11369, .13787));
        p3 += dot(p3, p3.yzx + 19.19);
        return fract(vec3((p3.x + p3.y) * p3.z, (p3.x + p3.z) * p3.y, (p3.y + p3.z) * p3.x));
      }

      float N(float t) {
        return fract(sin(t * 12345.564) * 7658.76);
      }

      float Saw(float b, float t) {
        return S(0., b, t) * S(1., b, t);
      }

      vec2 DropLayer2(vec2 uv, float t) {
        vec2 UV = uv;
        uv.y += t * 0.75;
        vec2 a = vec2(6., 1.);
        vec2 grid = a * 2.;
        vec2 id = floor(uv * grid);
        float colShift = N(id.x);
        uv.y += colShift;
        id = floor(uv * grid);
        vec3 n = N13(id.x * 35.2 + id.y * 2376.1);
        vec2 st = fract(uv * grid) - vec2(.5, 0.);
        float x = n.x - .5;
        float y = UV.y * 20.;
        float wiggle = sin(y + sin(y));
        x += wiggle * (.5 - abs(x)) * (n.z - .5);
        x *= .7;
        float ti = fract(t + n.z);
        y = (Saw(.85, ti) - .5) * .9 + .5;
        vec2 p = vec2(x, y);
        float d = length((st - p) * a.yx);
        float mainDrop = S(.4, .0, d);
        float r = sqrt(S(1., y, st.y));
        float cd = abs(st.x - x);
        float trail = S(.23 * r, .15 * r * r, cd);
        float trailFront = S(-.02, .02, st.y - y);
        trail *= trailFront * r * r;
        y = UV.y;
        float trail2 = S(.2 * r, .0, cd);
        float droplets = max(0., (sin(y * (1. - y) * 120.) - st.y)) * trail2 * trailFront * n.z;
        y = fract(y * 10.) + (st.y - .5);
        float dd = length(st - vec2(x, y));
        droplets = S(.3, 0., dd);
        float m = mainDrop + droplets * r * trailFront;
        return vec2(m, trail);
      }

      float StaticDrops(vec2 uv, float t) {
        uv *= 40.;
        vec2 id = floor(uv);
        uv = fract(uv) - .5;
        vec3 n = N13(id.x * 107.45 + id.y * 3543.654);
        vec2 p = (n.xy - .5) * .7;
        float d = length(uv - p);
        float fade = Saw(.025, fract(t + n.z));
        float c = S(.3, 0., d) * fract(n.z * 10.) * fade;
        return c;
      }

      vec2 Drops(vec2 uv, float t, float l0, float l1, float l2) {
        float s = StaticDrops(uv, t) * l0;
        vec2 m1 = DropLayer2(uv, t) * l1;
        vec2 m2 = DropLayer2(uv * 1.85, t) * l2;
        float c = s + m1.x + m2.x;
        c = S(.3, 1., c);
        return vec2(c, max(m1.y * l0, m2.y * l1));
      }

      void main() {
        vec2 fragCoord = gl_FragCoord.xy;
        vec2 uv = (fragCoord.xy - .5 * iResolution.xy) / iResolution.y;
        vec2 UV = fragCoord.xy / iResolution.xy;
        
        float T = iTime;
        float t = T * .2;
        float rainAmount = 0.5;
        float activeZoom = uZoom;

        if (uAutoRain > 0.5) {
          rainAmount = sin(T * .05) * .3 + .7;
        } else {
          rainAmount = uRainAmount;
        }
        float maxBlur = mix(3., 6., rainAmount) * uBlurScale;
        float minBlur = 2.0 * uBlurScale;
        uv *= activeZoom;

        UV = (UV - .5) * (.9 + (activeZoom - 1.0) * 0.1) + .5;

        float staticDrops = S(-.5, 1., rainAmount) * 2.;
        float layer1 = S(.25, .75, rainAmount);
        float layer2 = S(.0, .5, rainAmount);

        vec2 c = Drops(uv, t, staticDrops, layer1, layer2);

        vec2 e = vec2(.001, 0.);
        float cx = Drops(uv + e, t, staticDrops, layer1, layer2).x;
        float cy = Drops(uv + e.yx, t, staticDrops, layer1, layer2).x;
        vec2 n = vec2(cx - c.x, cy - c.x);

        float focus = mix(maxBlur - c.y, minBlur, S(.1, .2, c.x));
        vec3 col = texture2D(iChannel0, UV + n, focus).rgb;

        // Post processing (contrast, color shifts, lightning, vignettes)
        t = (T + 3.) * .5;
        float colFade = sin(t * .2) * .5 + .5;
        col *= mix(vec3(1.), vec3(.8, .9, 1.3), colFade * 0.4);

        if (uHasLightning > 0.5) {
          float fade = S(0., 10., T);
          float lightning = sin(t * sin(t * 10.));
          lightning *= pow(max(0., sin(t + sin(t))), 10.);
          col *= 1. + lightning * fade;
        }

        vec2 vignetteUv = fragCoord.xy / iResolution.xy;
        col *= 1. - dot(vignetteUv - 0.5, vignetteUv - 0.5) * 0.8;

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    // ===================== 创建材质与网格 =====================
    const uniforms = {
      iTime: { value: 0 },
      iResolution: { value: new THREE.Vector3(size.x, size.y, 1) },
      iMouse: { value: mouse },
      iChannel0: { value: bgTexture },
      uRainAmount: { value: 0.7 },
      uAutoRain: { value: 1.0 },
      uZoom: { value: 1.0 },
      uBlurScale: { value: 1.0 },
      uHasLightning: { value: 1.0 }
    };

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
    });

    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(mesh);

    // ===================== 响应窗口变化 =====================
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      renderer.getDrawingBufferSize(size);
      uniforms.iResolution.value.set(size.x, size.y, 1);
    });

    // ===================== 动画循环 =====================
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      uniforms.iTime.value = clock.getElapsedTime();
      renderer.render(scene, camera);
    }
    animate();

    // ===================== 交互控制面板逻辑 =====================
    const controlPanel = document.getElementById('controlPanel');
    const togglePanelBtn = document.getElementById('togglePanelBtn');

    // 折叠/展开控制面板
    const togglePanel = () => {
      controlPanel.classList.toggle('collapsed');
    };
    togglePanelBtn.addEventListener('click', togglePanel);

    // 双击屏幕折叠/展开
    window.addEventListener('dblclick', (e) => {
      if (e.target.closest('.control-panel')) return;
      togglePanel();
    });

    // 动态更换背景
    const setBackground = (url) => {
      loader.load(url, (texture) => {
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        texture.generateMipmaps = true;
        texture.needsUpdate = true;
        uniforms.iChannel0.value = texture;
      });
    };

    const presetMap = {
      neon: 'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1920&q=80',
      forest: 'https://images.unsplash.com/photo-1511497584788-876760111969?w=1920&q=80',
      car: 'https://images.unsplash.com/photo-1486016006115-74a41448aea2?w=1920&q=80',
      minimal: 'https://images.unsplash.com/photo-1508873696983-2df519f0397e?w=1920&q=80'
    };

    document.querySelectorAll('.bg-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        const activePreset = document.querySelector('.bg-preset.active');
        if (activePreset) activePreset.classList.remove('active');
        btn.classList.add('active');
        const bgType = btn.getAttribute('data-bg');
        setBackground(presetMap[bgType]);
      });
    });

    // 雨量控制
    const rainRange = document.getElementById('rainAmountRange');
    const rainVal = document.getElementById('rainAmountValue');
    const autoRain = document.getElementById('autoRainCheckbox');

    const updateRainLabel = (val) => {
      if (val < 0.3) rainVal.innerText = '小';
      else if (val < 0.7) rainVal.innerText = '中';
      else rainVal.innerText = '大';
    };

    rainRange.addEventListener('input', () => {
      const val = parseFloat(rainRange.value);
      uniforms.uRainAmount.value = val;
      updateRainLabel(val);
      autoRain.checked = false;
      uniforms.uAutoRain.value = 0.0;
    });

    autoRain.addEventListener('change', () => {
      uniforms.uAutoRain.value = autoRain.checked ? 1.0 : 0.0;
      if (autoRain.checked) {
        rainVal.innerText = '动态';
      } else {
        updateRainLabel(parseFloat(rainRange.value));
        uniforms.uRainAmount.value = parseFloat(rainRange.value);
      }
    });

    // 背景模糊控制
    const blurRange = document.getElementById('blurRange');
    const blurVal = document.getElementById('blurValue');
    blurRange.addEventListener('input', () => {
      const val = parseFloat(blurRange.value);
      uniforms.uBlurScale.value = val;
      blurVal.innerText = val.toFixed(1);
    });

    // 画面缩放控制
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomValue');
    zoomRange.addEventListener('input', () => {
      const val = parseFloat(zoomRange.value);
      uniforms.uZoom.value = val;
      zoomVal.innerText = val.toFixed(2) + 'x';
    });

    // 闪电开关
    const lightningToggle = document.getElementById('lightningToggle');

    lightningToggle.addEventListener('change', () => {
      uniforms.uHasLightning.value = lightningToggle.checked ? 1.0 : 0.0;
    });

    // ===================== 音频播放逻辑 =====================
    let audio = null;
    const playBtn = document.getElementById('audioPlayBtn');
    const volContainer = document.querySelector('.audio-volume');
    const volRange = document.getElementById('volumeRange');

    playBtn.addEventListener('click', () => {
      if (!audio) {
        // 使用公开的高品质循环雨声音频链接
        audio = new Audio('https://www.orangefreesounds.com/wp-content/uploads/2018/04/Gentle-rain-loop.mp3');
        audio.loop = true;
        audio.volume = parseFloat(volRange.value);
        audio.addEventListener('error', (e) => {
          console.error("Audio failed to load:", e);
          alert("无法加载背景雨声，请检查网络连接。");
          audio = null;
          resetAudioUI();
        });
      }

      if (audio.paused) {
        audio.play().then(() => {
          playBtn.querySelector('.play-icon').style.display = 'none';
          playBtn.querySelector('.pause-icon').style.display = 'block';
          playBtn.querySelector('span').innerText = '暂停背景雨声';
          volContainer.style.display = 'flex';
        }).catch(err => {
          console.error("Playback blocked or failed:", err);
        });
      } else {
        audio.pause();
        resetAudioUI();
      }
    });

    function resetAudioUI() {
      playBtn.querySelector('.play-icon').style.display = 'block';
      playBtn.querySelector('.pause-icon').style.display = 'none';
      playBtn.querySelector('span').innerText = '播放背景雨声';
      volContainer.style.display = 'none';
    }

    volRange.addEventListener('input', () => {
      if (audio) {
        audio.volume = parseFloat(volRange.value);
      }
    });
  </script>
</body>

</html>
