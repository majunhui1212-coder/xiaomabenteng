<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>液态玻璃效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover no-repeat;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    /* 背景模糊层 */
    .glass-container {
      position: relative;
      width: 400px;
      padding: 40px;
      border-radius: 20px;
      /* 核心：背景模糊实现液态玻璃感 */
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      border-left: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 
        0 8px 32px 0 rgba(31, 38, 135, 0.37),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-container:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 15px 40px 0 rgba(31, 38, 135, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    /* 高光反射效果 */
    .glass-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(255, 255, 255, 0.1) 40%,
        rgba(255, 255, 255, 0.2) 50%,
        rgba(255, 255, 255, 0.1) 60%,
        transparent 70%
      );
      transform: rotate(45deg);
      pointer-events: none;
      animation: shimmer 6s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
      }
      100% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
      }
    }

    /* 内容层 */
    .content {
      position: relative;
      z-index: 1;
      color: #fff;
      text-align: center;
    }

    .content h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .content p {
      font-size: 1rem;
      line-height: 1.8;
      opacity: 0.9;
      text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
    }

    .content .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .content .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
    }

    /* 装饰性背景元素 */
    .bg-shapes {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 20s infinite ease-in-out;
    }

    .shape:nth-child(1) {
      width: 300px;
      height: 300px;
      background: rgba(255, 100, 100, 0.4);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 400px;
      height: 400px;
      background: rgba(100, 100, 255, 0.4);
      bottom: 10%;
      right: 10%;
      animation-delay: -5s;
    }

    .shape:nth-child(3) {
      width: 250px;
      height: 250px;
      background: rgba(100, 255, 100, 0.3);
      top: 50%;
      left: 50%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -50px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
    }
  </style>
</head>
<body>
  <!-- 装饰性背景 -->
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <!-- 液态玻璃卡片 -->
  <div class="glass-container">
    <div class="content">
      <h1>液态玻璃</h1>
      <p>
        这是一种现代 UI 设计效果，通过 backdrop-filter 实现背景模糊，
        配合半透明背景和微妙边框，营造出类似磨砂玻璃的质感。
      </p>
      <a href="#" class="btn">了解更多</a>
    </div>
  </div>
</body>
</html>
