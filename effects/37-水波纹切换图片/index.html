<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水波扭曲转场动画 - 燕云十六声官网效果复现 Demo</title>
  <meta name="description" content="基于 Three.js / WebGL Displacement Shader & GSAP 实现的水波纹/流体扭曲图片切换效果，复现自《燕云十六声》官方网站。">
  
  <!-- Google Fonts Outfit and Noto Serif SC for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fullscreen WebGL Container -->
  <div id="webgl-container"></div>
  
  <!-- Main Overlay UI -->
  <div class="overlay-container">
    <!-- Top Header Navigation -->
    <header class="header">
      <div class="logo">
        <span class="logo-main">YANYUN</span>
        <span class="logo-sub">燕云十六声</span>
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-item active">原野</a>
        <a href="#" class="nav-item">山川</a>
        <a href="#" class="nav-item">城郭</a>
      </nav>
    </header>

    <!-- Center Content / Story Section -->
    <main class="content-wrapper">
      <div class="card" id="slide-info-card">
        <h2 class="slide-subtitle" id="slide-sub">WHERE WINDS MEET</h2>
        <h1 class="slide-title" id="slide-title">原野苍茫，天地同襟</h1>
        <p class="slide-description" id="slide-desc">
          文心可鉴，知己长存。游侠可继续乘风向东，踏足青州，体验晨昏有书卷、往来皆同窗的求学生活。风卷浮云，十六声起，天下大义于此间汇聚。
        </p>
        <div class="slide-meta">
          <span class="meta-tag">开放世界</span>
          <span class="meta-tag">武侠巨作</span>
        </div>
      </div>
    </main>

    <!-- Bottom Controls Section -->
    <footer class="controls-footer">
      <!-- Pagination Controls -->
      <div class="pagination" id="pagination">
        <button class="dot-btn active" data-index="0" id="dot-0" aria-label="Go to slide 1"></button>
        <button class="dot-btn" data-index="1" id="dot-1" aria-label="Go to slide 2"></button>
        <button class="dot-btn" data-index="2" id="dot-2" aria-label="Go to slide 3"></button>
      </div>

      <!-- Arrow Controls -->
      <div class="nav-arrows">
        <button class="arrow-btn" id="prev-btn" aria-label="Previous slide">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <button class="arrow-btn" id="next-btn" aria-label="Next slide">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- Loading Screen -->
  <div id="loader" class="loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text">神仙请示中...</div>
    </div>
  </div>

  <!-- Import Three.js and GSAP via unpkg -->
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
