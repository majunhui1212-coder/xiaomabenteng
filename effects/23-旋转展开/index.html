<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .card {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        position: relative;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 300px;
        height: 350px;
        border-radius: 6px;
        transition: 0.3s;
        background-color: #000;
        margin: 300px auto;
      }

      .card-p {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 6px;
      }

      .card::after {
        content: "";
        position: absolute;
        z-index: -6;
        border-radius: 6px;
        width: 320px;
        height: 370px;
        background-color: #8ec5fc;
        transition: 0.7s;
        background-image: linear-gradient(62deg, #8ec5fc 0%, #e0c3fc 100%);
      }

      .card-countent {
        padding: 20px;
        text-align: center;
        color: transparent;
        transition: all 0.7s;
        opacity: 0;
      }

      .card:hover {
        transition: 0.7s;
        transform: rotate(180deg);
      }

      .card:hover > .card-p {
        opacity: 0;
      }

      .card:hover > .card-countent {
        opacity: 1;
        color: #000;
        transform: rotate(-180deg);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="card-p"
        src="https://picsum.photos/200/200?random=100"
        alt="Hover image"
      />
      <!-- <img src="https://picsum.photos/1920/720?random=100" alt="背景图片" /> -->
      <div class="card-countent">
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque hic
          soluta amet, ipsum quia numquam excepturi veritatis deleniti similique
          ipsam obcaecati nulla dolor, sapiente earum blanditiis pariatur minima
          iure repudiandae.
        </p>
      </div>
    </div>
  </body>
</html>
